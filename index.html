<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lola Chef | Alimentos Gourmet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rojo-espana: #AA151B; /* Rojo Bandera */
            --oro-espana: #F1BF00;  /* Oro Bandera */
            --negro-elegante: #1A1A1A;
            --blanco-fondo: #FDFDFD;
        }

        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: var(--blanco-fondo); 
            margin: 0; 
            color: var(--negro-elegante); 
        }
        
        /* Header con colores de España */
        header { 
            background-color: var(--rojo-espana); 
            color: white; 
            text-align: center; 
            padding: 2.5rem 1rem; 
            border-bottom: 6px solid var(--oro-espana); 
        }

        .logo { 
            max-width: 180px; 
            height: auto;
            margin-bottom: 15px; 
            border-radius: 8px;
        }

        .tagline { 
            font-style: italic; 
            font-size: 1rem; 
            max-width: 500px; 
            margin: 15px auto; 
            line-height: 1.4;
            color: #eee;
        }

        /* Botones de Redes Sociales */
        .social-links { margin-top: 20px; }
        .social-links a { 
            color: white; 
            font-size: 1.8rem; 
            margin: 0 15px; 
            text-decoration: none; 
            transition: transform 0.2s, color 0.2s; 
            display: inline-block;
        }
        .social-links a:hover { 
            color: var(--oro-espana); 
            transform: scale(1.1); 
        }

        /* Galería de Fotos */
        .galeria-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .galeria { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 12px; 
        }
        .galeria img { 
            width: 100%; 
            height: 120px;
            object-fit: cover;
            border-radius: 6px; 
            border: 1px solid #ddd; 
        }

        /* Contenedor del Menú */
        #menu-container { 
            padding: 20px; 
            max-width: 700px; 
            margin: 20px auto; 
        }
        h2 { 
            text-align: center; 
            color: var(--rojo-espana); 
            border-bottom: 2px solid var(--oro-espana);
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
        }

        .item-menu { 
            background: white; 
            border-left: 5px solid var(--rojo-espana); 
            margin-bottom: 12px; 
            padding: 18px; 
            border-radius: 4px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .nombre-platillo { font-weight: 600; font-size: 1.1rem; }
        .item-precio { 
            font-weight: bold; 
            color: var(--rojo-espana); 
            font-size: 1.2rem;
        }

        #loading { text-align: center; font-style: italic; color: #666; }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <img src="LogoLOLAChef.jpg" alt="Lola Chef Logo" class="logo">
    <h1>Lola Chef</h1>
    <p class="tagline">"Jamones ibéricos, cortes finos, carnes frías, pescados, mariscos y alimentos gourmet."</p>
    
    <div class="social-links">
        <a href="https://www.facebook.com/lolachefmx/?locale=es_LA" target="_blank" title="Facebook">
            <i class="fab fa-facebook"></i>
        </a>
        <a href="https://www.instagram.com/lolachefmx/" target="_blank" title="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://wa.me/522225980298" target="_blank" title="WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>
</header>

<section class="galeria-container">
    <div class="galeria">
        <img src="gal1.png" alt="Especialidad 1">
        <img src="gal2.png" alt="Especialidad 2">
        <img src="gal3.png" alt="Especialidad 3">
        <img src="gal4.png" alt="Especialidad 4">
        <img src="gal5.png" alt="Especialidad 5">
        <img src="gal6.png" alt="Especialidad 6">
    </div>
</section>

<div id="menu-container">
    <h2>Catálogo de Productos</h2>
    <div id="loading">Consultando productos frescos...</div>
    <div id="lista-articulos"></div>
</div>

<footer>
    &copy; 2026 Lola Chef - Alimentos Gourmet
</footer>

<script>
    // Tu link de Google Sheets (CSV)
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJUlaSWLSJCLCqFE-UZEvggXm9s2oLLf-g95KdX7ISEE1cayiKEZe0-EXlPUsVxCPMLVvkzj5hX_ko/pub?output=csv';

    async function cargarMenu() {
        try {
            const respuesta = await fetch(SHEET_URL);
            const datos = await respuesta.text();
            
            // Separamos por líneas y quitamos la primera (cabecera)
            const filas = datos.split('\n').slice(1); 
            const contenedor = document.getElementById('lista-articulos');
            const loadingMsg = document.getElementById('loading');
            
            contenedor.innerHTML = ''; 

            filas.forEach(fila => {
                // Limpiamos espacios y separamos por coma
                const columnas = fila.split(',');
                
                if (columnas.length >= 2 && columnas[0].trim() !== "") {
                    const nombre = columnas[0].trim();
                    const precio = columnas[1].trim();
                    
                    const htmlItem = `
                        <div class="item-menu">
                            <span class="nombre-platillo">${nombre}</span>
                            <span class="item-precio">$${precio}</span>
                        </div>
                    `;
                    contenedor.innerHTML += htmlItem;
                }
            });

            loadingMsg.style.display = 'none'; // Ocultar mensaje de carga

        } catch (error) {
            console.error('Error cargando el menú:', error);
            document.getElementById('loading').innerHTML = 'No se pudo cargar el menú. Revisa la conexión.';
        }
    }

    // Ejecutar al cargar la página
    window.onload = cargarMenu;
</script>

</body>
</html>
